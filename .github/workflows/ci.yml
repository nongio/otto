name: Continuous Integration

on:
  push:
    branches:
    - main
    tags:
    - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: rustfmt
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-rust_stable-${{ hashFiles('**/Cargo.toml') }}
      - name: Format
        run: cargo fmt --all -- --check
  
  check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: clippy
      - name: Cargo registry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-registry-
      - name: System dependencies
        run: sudo apt-get update; sudo apt-get install -y libdrm-dev libudev-dev libgbm-dev libxkbcommon-dev libegl1-mesa-dev libwayland-dev libinput-dev libdbus-1-dev libsystemd-dev libseat-dev libpipewire-0.3-dev libfreetype-dev libfontconfig-dev libdisplay-info-dev libpixman-1-dev hicolor-icon-theme fonts-dejavu-core
      - name: Clippy
        run: cargo clippy --features "default" -- -D warnings
      - name: Run tests
        run: cargo test --lib --workspace
  
  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@1.87.0
      - name: Cargo registry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-registry-
      - name: System dependencies
        run: sudo apt-get update; sudo apt-get install -y libdrm-dev libudev-dev libgbm-dev libxkbcommon-dev libegl1-mesa-dev libwayland-dev libinput-dev libdbus-1-dev libsystemd-dev libseat-dev libpipewire-0.3-dev libfreetype-dev libfontconfig-dev libdisplay-info-dev libpixman-1-dev hicolor-icon-theme
      - name: Install cargo-deb
        run: cargo install cargo-deb
      - name: Build workspace binaries
        run: cargo build --release -p otto -p xdg-desktop-portal-otto
      - name: Build Debian package
        run: cargo deb --no-strip
      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: otto-deb
          path: target/debian/*.deb
          retention-days: 30
  
  build-rpm:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@1.87.0
      - name: Cargo registry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-registry-
      - name: System dependencies
        run: sudo apt-get update; sudo apt-get install -y libdrm-dev libudev-dev libgbm-dev libxkbcommon-dev libegl1-mesa-dev libwayland-dev libinput-dev libdbus-1-dev libsystemd-dev libseat-dev libpipewire-0.3-dev libfreetype-dev libfontconfig-dev libdisplay-info-dev libpixman-1-dev hicolor-icon-theme
      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm
      - name: Build workspace binaries
        run: cargo build --release -p otto -p xdg-desktop-portal-otto
      - name: Build RPM package
        run: cargo generate-rpm
      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: otto-rpm
          path: target/generate-rpm/*.rpm
          retention-days: 30
  
  build-arch:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@1.87.0
      - name: Cargo registry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-registry-
      - name: System dependencies
        run: sudo apt-get update; sudo apt-get install -y libdrm-dev libudev-dev libgbm-dev libxkbcommon-dev libegl1-mesa-dev libwayland-dev libinput-dev libdbus-1-dev libsystemd-dev libseat-dev libpipewire-0.3-dev libfreetype-dev libfontconfig-dev libdisplay-info-dev libpixman-1-dev hicolor-icon-theme
      - name: Build workspace binaries
        run: cargo build --release -p otto -p xdg-desktop-portal-otto
      - name: Build Arch tarball
        run: |
          PKGVER=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          TARBALL="otto-${PKGVER}-x86_64.tar.gz"
          tmpdir=$(mktemp -d)
          PKGDIR="otto-${PKGVER}"
          install -Dm755 target/release/otto "$tmpdir/$PKGDIR/target/release/otto"
          install -Dm755 target/release/xdg-desktop-portal-otto "$tmpdir/$PKGDIR/target/release/xdg-desktop-portal-otto"
          install -m644 LICENSE "$tmpdir/$PKGDIR/LICENSE"
          install -m644 README.md "$tmpdir/$PKGDIR/README.md"
          install -m644 otto_config.example.toml "$tmpdir/$PKGDIR/otto_config.example.toml"
          install -Dm644 resources/otto.desktop "$tmpdir/$PKGDIR/resources/otto.desktop"
          install -Dm644 components/xdg-desktop-portal-otto/otto.portal "$tmpdir/$PKGDIR/components/xdg-desktop-portal-otto/otto.portal"
          install -Dm644 components/xdg-desktop-portal-otto/org.freedesktop.impl.portal.desktop.otto.service "$tmpdir/$PKGDIR/components/xdg-desktop-portal-otto/org.freedesktop.impl.portal.desktop.otto.service"
          install -Dm644 components/xdg-desktop-portal-otto/portals.conf.example "$tmpdir/$PKGDIR/components/xdg-desktop-portal-otto/portals.conf.example"
          install -m644 PKGBUILD-git "$tmpdir/$PKGDIR/PKGBUILD-git"
          install -m644 PKGBUILD-nightly-bin "$tmpdir/$PKGDIR/PKGBUILD-nightly-bin"
          # VERSION file for PKGBUILD-nightly-bin pkgver()
          echo "${PKGVER}.r$(git rev-list --count HEAD).$(git rev-parse --short HEAD)" > "$tmpdir/$PKGDIR/VERSION"
          tar -czf "$TARBALL" -C "$tmpdir" "$PKGDIR"
          # Also produce a fixed-name copy for the nightly release
          cp "$TARBALL" otto-nightly-x86_64.tar.gz
          rm -rf "$tmpdir"
      - name: Upload Arch tarball
        uses: actions/upload-artifact@v4
        with:
          name: otto-arch
          path: otto-*.tar.gz
          retention-days: 30

  publish-nightly:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-arch]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download Arch tarball
        uses: actions/download-artifact@v4
        with:
          name: otto-arch
      - name: Publish nightly release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          files: otto-nightly-x86_64.tar.gz
          body: |
            Automated nightly build from the latest commit on `main`.

            ### Arch Linux (binary, no compilation needed)
            ```bash
            mkdir otto && tar -xzf otto-nightly-x86_64.tar.gz -C otto
            cd otto
            makepkg -p PKGBUILD-nightly-bin -si
            ```

            To update, re-download the tarball and re-run `makepkg`.

  validate-pkgbuild:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: pacman -Syu --noconfirm base-devel git
      - name: Setup build user
        run: |
          useradd -m builder
          chown -R builder:builder .
      - name: Validate PKGBUILD (bin)
        run: |
          DIR=$PWD
          su builder -c "cd $DIR && makepkg --printsrcinfo"
      - name: Validate PKGBUILD-git
        run: |
          DIR=$PWD
          su builder -c "cd $DIR && makepkg --printsrcinfo -p PKGBUILD-git"
      - name: Validate PKGBUILD-nightly-bin
        run: |
          DIR=$PWD
          su builder -c "cd $DIR && makepkg --printsrcinfo -p PKGBUILD-nightly-bin"
  
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-deb, build-rpm, build-arch, validate-pkgbuild]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: otto-deb
          path: artifacts/deb
      - name: Download .rpm artifact
        uses: actions/download-artifact@v4
        with:
          name: otto-rpm
          path: artifacts/rpm
      - name: Download Arch tarball
        uses: actions/download-artifact@v4
        with:
          name: otto-arch
          path: artifacts/arch
      - name: Create release body
        run: |
          cat > release_notes.md << 'EOF'
          ## Installation

          ### Debian/Ubuntu (`.deb`)
          ```bash
          sudo dpkg -i otto_*.deb
          sudo apt-get install -f  # Install dependencies
          ```

          ### Fedora/RHEL (`.rpm`)
          ```bash
          sudo rpm -i otto-*.rpm
          # or
          sudo dnf install otto-*.rpm
          ```

          ### Arch Linux
          ```bash
          curl -O https://raw.githubusercontent.com/nongio/otto/main/PKGBUILD
          makepkg -si
          ```
          If you already downloaded the tarball, place the PKGBUILD in the same directory and run `makepkg -si` — it will use the local file without re-downloading.

          ---
          EOF
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/deb/*.deb
            artifacts/rpm/*.rpm
            artifacts/arch/*.tar.gz
          body_path: release_notes.md
          generate_release_notes: true
          draft: true
          prerelease: false